<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Joe's Hotdogs</h1>

    <!-- Part 4 -->
    <h2>Part 4:</h2>

    <!-- Dropdown menu -->
    <select name="selectMenuItems" id="menuItems"></select>

    <!-- Shopping Cart -->
    <button>Add to Cart</button>

    <!-- Items inside the cart -->
    <div></div>

    <!-- Checkout -->
    <button>Checkout</button>

    <script>
        
        const menu = {
            Hotdogs: 4,
            Fries: 3.50,
            Soda: 1.50,
            Sauerkraut: 1
        }

        const menuKeys = Object.keys(menu)
        const menuValues = Object.values(menu)

        let dropDownMenu = "";
        for (i = 0; i < menuKeys.length; i++) {
            dropDownMenu += "<option>" + menuKeys[i] + " - $" + menuValues[i] + "</option>";
        }
        document.getElementById("menuItems").innerHTML = dropDownMenu;

        console.log(menuKeys[1]);
        console.log(menuValues[1]);
        
    </script>

</body>
</html>
