<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Joe's Hotdogs</h1>

    <!-- Part 4, 5, and 6 -->
    <h2>Part 4, 5, and 6:</h2>

    <!-- Dropdown menu -->
    <select name="selectMenuItems" id="menuItems"></select>

    <!-- Shopping Cart -->
    <button id="addToCartButton" onclick="addToCart()">Add to Cart</button>

    <!-- Items inside the cart -->
    <div id="cartListOfItems"></div>

    <!-- Cart Sum -->
    <div id="cartSum"></div>

    <!-- Checkout -->
    <button id="checkOutButton" onclick="checkOut()">Checkout</button>

    <script>

        const menu = {
            Hotdogs: 4,
            Fries: 3.50,
            Soda: 1.50,
            Sauerkraut: 1
        }

        const menuKeys = Object.keys(menu)
        const menuValues = Object.values(menu)

        let dropDownMenu = "";
        for (i = 0; i < menuKeys.length; i++) {
            dropDownMenu += "<option>" + menuKeys[i] + " - $" + menuValues[i] + "</option>";
        }

        // Render DropDown menu
        document.getElementById("menuItems").innerHTML = dropDownMenu;


        // Initialize variables to know what item(s) the user selected:
        cartArray = []
        let sum = 0;

        // Function to toggle checkout button visibility
        function toggleCheckoutButton() {
            const button = document.getElementById("checkOutButton");
            if (cartArray.length > 0) {
                button.style.display = "block";
            } else {
                button.style.display = "none";
            }
        }

        // Hide button on page load
        window.onload = function() {
            toggleCheckoutButton();
        }

        // Know the exact selected items
        document.getElementById("menuItems").addEventListener("change", function() {
            const selectedIndex = this.selectedIndex;
            // console.log("You selected:", menuKeys[selectedIndex]);
            // console.log("Cart Array has:", cartArray);
            
        });
        
        // Add to Cart function
        function addToCart() {
            const selectedIndex = document.getElementById("menuItems").selectedIndex;
            cartArray.push(menuKeys[selectedIndex], menuValues[selectedIndex]);
            console.log("Cart Array has:", cartArray);

            // Render the cart list
            let cartPreview = "";

            // Reset total price
            sum = 0;

            for (let i = 0; i < cartArray.length; i += 2) {
                cartPreview += cartArray[i] + " - $" + cartArray[i+1] + "<br>";
                sum += cartArray[i+1];
            }
            document.getElementById("cartListOfItems").innerHTML = cartPreview;
            document.getElementById("cartSum").innerHTML = "Total: $" + sum;
            toggleCheckoutButton();
        }
        
        function checkOut() {
            alert("Number of Items: " + (cartArray.length / 2) + " Total: $" + sum)
            
            // Clear values
            cartArray = []
            sum = 0;
            cartPreview = "";

            // Clear render on browser
            document.getElementById("cartListOfItems").innerHTML = cartPreview;
            document.getElementById("cartSum").innerHTML = "Total: $" + sum;
            toggleCheckoutButton();
        }
        
    </script>

</body>
</html>
