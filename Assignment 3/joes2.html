<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Joe's Hotdogs</h1>

    <!-- Part 4 -->
    <h2>Part 4:</h2>

    <!-- Dropdown menu -->
    <select name="selectMenuItems" id="menuItems"></select>

    <!-- Shopping Cart -->
    <button>Add to Cart</button>

    <!-- Items inside the cart -->
    <div></div>

    <!-- Checkout -->
     <button>Checkout</button>

    <script>
        
        menu = [];
        menu["Hotdogs"] = 4
        menu["Fries"] = 3.50
        menu["Soda"] = 1.50
        menu["Sauerkraut"] = 1
    
        
        let html = "";
        for (key in menu) {
            html += "<option>" + key + " - $" + menu[key] + "</option>";
        }
        document.getElementById("menuItems").innerHTML = html;
    
    </script>


</body>
</html>
