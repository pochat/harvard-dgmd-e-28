<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplicate Characters</title>
</head>
<body>
    <h1>Duplicate Characters</h1>

    <script>
    
        // Define empty object to receive word
        let wordChars = {};

        // Function to check how many letters are duplicated
        function countCharacters(word) {
            for (i = 0; i < word.length; i++) {
                let char = word[i];

                // If the character does not exist in the object, assign value of 0
                wordChars[char] = (wordChars[char] || 0) + 1; 
            }
            
        }
        
        countCharacters("Sonia Bolduc")
        document.write(JSON.stringify(wordChars))
    </script>


</body>
</html>
