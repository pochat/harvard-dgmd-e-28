<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplicate Characters</title>

    <style>
        body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: bold;
        }
        .black {
            color: black;
        }
        .yellow {
            color: yellow;
        }
        .green {
            color: green;
        }
        .gray {
            color: gray;
        }
    </style>
</head>
<body>
    <h1>Duplicate Characters</h1>

    <div id="originalCharacters" class="black"></div>
    <div id="userGuessText" class="black"></div>

    <script>
    
        // Define an empty object to receive word
        let wordChars = {};
        let userGuess = ""
        originalText = document.getElementById("originalCharacters")
        userGuessText = document.getElementById("userGuessText")

        // Function to check how many letters are duplicated
        function countDuplicatedCharacters(word, userGuessParam) {

            userGuess = userGuessParam
            
            for (i = 0; i < word.length; i++) {
                let char = word[i];

                // If the character does not exist in the object, assign value of 0
                wordChars[char] = (wordChars[char] || 0) + 1; 
            }
            console.log("WordChars: ", wordChars);
            console.log("User Guess: ", userGuess);

            for (i = 0; i < userGuess.length; i++) {
                // Create a span for each character
                const charSpan = document.createElement('span');
                charSpan.textContent = userGuess[i];

                // Color it green if it's in the word
                if (wordChars[userGuess[i]] && word[i] === userGuess[i]) {
                    charSpan.className = "green";
                    console.log("all: " + userGuess[i]);
                }

                else if (wordChars[userGuess[i]] && word[i] != userGuess[i]) {
                    charSpan.className = "yellow";
                    console.log("all: " + userGuess[i]);
                }

                else {
                    charSpan.className = "gray";

                }

                // Add the span to the div
                userGuessText.appendChild(charSpan);
            }

            
        }

        // In addition to duplicates, in what position do they sit?
        
        countDuplicatedCharacters("APPLE", "MALLO")
        originalText.innerHTML = JSON.stringify(wordChars)

    </script>


</body>
</html>
