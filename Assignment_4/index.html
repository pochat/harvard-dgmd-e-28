<!-- This program simulates a clone of the game "Wordle" -->
<!-- It is coded with the principle of functional programming -->
<!-- The stylesheet and the JS files are in a separate location -->
<!-- Live URL: https://pochat.github.io/harvard-dgmd-e-28/Assignment%204/index.html -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script></script>
    <script src="./wordleGameLogic.js"></script>
    <link rel="stylesheet" href="./styles.css">

    <title>Worldle</title>
</head>

<body>
    <div class="container">

        <h1 class="gameTitle">Wordle</h1>
        <p class="gameSubtitle">Harvard DGMD-28 - Mario Pochat</p>
        
        <div class="gameContainer"></div>

        <label class="instructions" id="gameInstructions" for="wordGuess">Enter a five letter word:</label>

        <!-- Accept Letters only On Input-->
        <!-- https://www.w3schools.com/tags/tryit.asp?filename=tryhtml5_ev_oninput -->
        <input type="text" id="wordGuess" name="wordGuess" minlength="5" maxlength="5" size="20" pattern="[a-zA-Z]+" required oninput="this.value = this.value.replace(/[^a-zA-Z]/g, ''); disabledButtonIfEmpty()">
        
        <!-- Start Game -->
        <input id="restartButton" type="button" value="Start Game" onclick="startGame()" style="display: none;">

        <!-- Invoke the function on click -->
        <input class="submitWordButton" id="submitButton" type="button" value="submit >" onclick="guessWord()">

        <div id="usedLetterBoard" class="usedLettersContainer"></div>
        
        
        <!-- Modal window -->
        <div id="modalWindow" class="modal">

            <!-- Modal Content -->
            <div class="modalContent">
                <span id="modalCloseID" class="modalClose">&times;</span>
                <p id="modalContentText" class="modalText"></p>
            </div>

        </div>


    </div>
</body>

</html>
