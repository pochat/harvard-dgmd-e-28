<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        addMoves = ["mario"];

        console.log("addMoves:", addMoves);
        
        let word = prompt("Enter a word");
        
        function addWord() {
            addMoves.push(word);
            return addMoves;
        }
        
        addWord();
        console.log("After function:", addMoves);

        // function toUpperCase(item) {
        //     return item.toUpperCase();
        // }

        let result = addMoves.map(item => item.toUpperCase());

        // document.write("<h1>" + result.join("<br>") + "</h1>")
        document.write("<h1>", result.join("<br>"), "</h1>")

    </script>

</body>
</html>
