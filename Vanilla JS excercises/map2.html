<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map</title>
</head>
<body>
    <h1>Map</h1>

    <script>

        x = [1, 2, 3, 4, 5]
        a = x.map(index => index * 2 + " mario")
        // 1 mario ,2 mario ,3 mario ,4 mario ,5 mario

        document.write("Orginal Array: " + x)
        document.write("<br>")
        document.write("Map Array: " + a)

    </script>

</body>
</html>
