<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Function</title>
</head>
<body>
    
    <h1>Return Function</h1>

    <script>

        function sum(a, b) {

            let result = a + b;
            return "The result is: " + result;

        }

        let total = sum(50, 30)
        document.write(total)

    </script>

</body>
</html>
