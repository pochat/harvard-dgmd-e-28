<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descructuring</title>
</head>
<body>

    <h1>Descructuring</h1>

    <script>

        function destruc(){            

            const object = {
                name: "mario",
                age: 54,
                occupation: "CEO"
            }

            var { name, age, occupation} = object;

            document.write(name, age, occupation)

        }

        destruc();


    </script>
    
</body>
</html>
