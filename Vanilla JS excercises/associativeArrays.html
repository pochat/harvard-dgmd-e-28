<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Associative Arrays</title>
</head>
<body>
    
    <h1>Associative Arrays</h1>

    <script>

        function cities(city) {

            cities = {};

            cities["Vancouver"] = "BC"
            cities["Toronto"] = "ON"
            cities["Montreal"] = "QC"


            if (cities[city]) {
                document.write("The province for: " + city + " is " + cities[city])
            } else {
                document.write("The City does not exist")
            }

        }

        cities("Vancouver")

    </script>
</body>
</html>
