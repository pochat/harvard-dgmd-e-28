<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count down</title>
</head>
<body>
    <h1>Countdown</h1>

    <script>

        let countDown = 0
        console.log("Outside loop: " + countDown);
        

        for (let i = 40; i >= 10; i--) {

            countDown = i            
            document.write("the countdown is: " + i + "<br>")
            
        }

    </script>
</body>
</html>
