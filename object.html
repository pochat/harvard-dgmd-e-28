<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Objects</h1>

    <script>

        const cities = {
            Vancouver: "BC",
            Edmonton: "AB",
            Montreal: "QB"
        }
        
        const justCitiesEntries = Object.entries(cities)
        const justCitiesKeys = Object.keys(cities)
        const justCitiesValues = Object.values(cities)

        document.write("Entries: " +justCitiesEntries + "<br>")
        document.write("Keys: " + justCitiesKeys + "<br>")
        document.write("Values: " + justCitiesValues + "<br>")

    </script>

</body>
</html>
