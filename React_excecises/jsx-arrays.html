<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>
    <h1>JSX Arrays</h1>
    <div id="myapp"></div>

    <script type="text/babel">

        function MyArray ({numbers}) {
            return (
                <div>
                    <p>{"The Array times two: " +  numbers.map(n => n * 2) }</p>
                    <p>{"The Array plus one: " +  numbers.map(n => n + 1) }</p>
                </div>
            )
        }

        const myRoot = ReactDOM.createRoot(document.getElementById("myapp"))
        myRoot.render(<MyArray numbers={[1,2,3,4]} />)

    </script>
    
</body>
</html>
