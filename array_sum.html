<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Sum</title>
</head>
<body>
    <h1>
        Array sum
    </h1>


    <script>

        ages = [12, 17, 55, 54]
        sum = 0;
        ages.forEach(n => sum += n);

        document.write("Sum is: ", sum)

    </script>
</body>
</html>
